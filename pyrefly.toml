# Pyrefly type-checker configuration.
# See https://pyrefly.org/en/docs/configuration/
#
# We run the "default" preset. The findings that existed when the preset was
# adopted are recorded in pyrefly-baseline.json so that CI only fails on newly
# introduced errors. The baseline is being burned down incrementally; to see
# the outstanding findings run `pyrefly check` after temporarily removing the
# `baseline` setting below.
project-includes = ["src/mbi/**/*.py"]
python-version = "3.11"
preset = "default"
baseline = "pyrefly-baseline.json"
