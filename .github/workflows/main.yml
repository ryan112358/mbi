name: Continuous Integration

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Check formatting with pyink
        run: |
          pyink --check --diff src test mechanisms examples

      - name: Lint with flake8
        run: |
          flake8 src test mechanisms examples

      - name: Check docstrings with pydocstyle
        run: |
          pydocstyle src/mbi/

      - name: Lint with pylint
        run: |
          pylint src/mbi/

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,docs]
          pip install pandas

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$PYTHONPATH:src/" >> $GITHUB_ENV

      - name: Run tests
        run: |
          pytest test/*.py

      - name: Doc tests
        run: |
          pytest --doctest-modules src/mbi/*.py

      - name: Type checking
        run: |
          pyrefly check
